<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EllesDeLanaStyle</title>
    <style>
    .shop-knop:hover {
        background-color: #5D4037 !important;
        transform: scale(1.05);
        transition: 0.3s;
    }
</style>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body style="background-color: #FAF9F6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;">

<div style="width: 380px; background-color: #F5F5DC; border: 1px solid #D2B48C; padding: 30px; border-radius: 15px; text-align: center; color: #5D4037; box-shadow: 0 20px 50px rgba(0,0,0,0.4);">
    
    <img src="kussen.jpg" 
     style="width: calc(100% + 60px); height: 350px; object-fit: cover; object-position: center; margin: -30px -30px 20px -30px; border-radius: 15px 15px 0 0;" 
     alt="Bohemian Kussens">
    <h1 style="margin-top: 20px; margin-bottom: 0; font-weight: normal; font-size: 42px; font-family: 'Great Vibes', cursive;">ellesdelanastyle</h1>

    <p style="font-size: 16px; margin-top: 5px; color: #8D6E63; font-family: 'Great Vibes', cursive;">
        Bohemian Accessories & Fashion
    </p>

   <div style="display: flex; justify-content: center; width: 100%; margin: 15px 0;">
    <div style="
        width: 64px; /* Iets kleiner venster knijpt het randje af */
        height: 64px; 
        border-radius: 50%; 
        border: 2px solid #4A3728;
        overflow: hidden; 
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #FAF9F6;
    ">
        <img src="logo e&d.png" alt="Logo Elles" style="
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.6); /* Letters blijven zichtbaar, zwart wordt geplet */
        ">
    </div>
</div>

    <a href="https://www.ellesdelanastyle.nl" class="shop-knop" style="
        display: inline-block;
        margin-top: 10px;
        padding: 12px 25px;
        background-color: #4A3728;
        color: #FAF9F6;
        text-decoration: none;
        border-radius: 50px;
        font-size: 14px;
        letter-spacing: 2px;
    ">
        SHOP DE COLLECTIE
    </a>

</div> </body>
</html>
